<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="下班打卡" />
  <title>下班时间记录</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <header class="app-header">
      <nav class="mode-nav" aria-label="记录模式切换">
        <a class="mode-link" href="./index.html">上班记录</a>
        <a class="mode-link active" href="./offwork.html">下班记录</a>
      </nav>
      <h1>下班步骤打卡</h1>
      <p id="todayLabel" class="today-label"></p>
      <div class="date-controls">
        <label class="date-label" for="datePicker">查看日期</label>
        <input id="datePicker" class="date-picker" type="date" />
        <button id="goTodayBtn" class="go-today-btn" type="button">回到今天</button>
      </div>
    </header>

    <section class="actions" id="actions"></section>

    <section class="records">
      <div class="records-head">
        <h2>今日记录</h2>
        <button id="resetBtn" class="reset-btn" type="button">清空今天</button>
      </div>
      <ul id="recordsList" class="records-list"></ul>
    </section>
  </main>

  <template id="actionButtonTemplate">
    <button class="action-btn" type="button">
      <span class="name"></span>
      <span class="time"></span>
    </button>
  </template>

  <script src="./offwork.js"></script>
</body>
</html>
